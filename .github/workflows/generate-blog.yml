name: Auto Generate Blog Post

on:
  schedule:
    - cron: "0 9 */3 * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate blog post
        run: node scripts/generate-blog.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "Blog Bot"
          git config user.email "bot@yourdomain.com"
          git add public/blog-images/ src/data/blogs.json
          git commit -m "auto: new blog post $(date +'%Y-%m-%d')" || echo "Nothing to commit"
          git push
